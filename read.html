<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG from Scratch — Чтение</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
        .nav{position:sticky;top:0;background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;gap:16px;z-index:100}
        .nav a{color:var(--accent);text-decoration:none;font-size:14px}
        .nav a:hover{text-decoration:underline}
        .container{max-width:900px;margin:0 auto;padding:32px 24px}
        .markdown-body h1,.markdown-body h2,.markdown-body h3,.markdown-body h4{margin-top:24px;margin-bottom:16px;font-weight:600;color:#fff}
        .markdown-body h1{font-size:2em;border-bottom:1px solid var(--border);padding-bottom:0.3em}
        .markdown-body h2{font-size:1.5em;border-bottom:1px solid var(--border);padding-bottom:0.3em}
        .markdown-body p{margin-bottom:16px}
        .markdown-body a{color:var(--accent);text-decoration:none}
        .markdown-body a:hover{text-decoration:underline}
        .markdown-body strong{color:#fff}
        .markdown-body code{padding:0.2em 0.4em;background:rgba(110,118,129,0.4);border-radius:6px;font-size:85%;font-family:'SF Mono',monospace}
        .markdown-body pre{padding:16px;background:var(--surface);border-radius:6px;border:1px solid var(--border);overflow:auto;margin-bottom:16px}
        .markdown-body pre code{padding:0;background:transparent;font-size:100%}
        .markdown-body blockquote{padding:0 1em;color:var(--muted);border-left:0.25em solid var(--border);margin-bottom:16px}
        .markdown-body ul,.markdown-body ol{padding-left:2em;margin-bottom:16px}
        .markdown-body li{margin-top:0.25em}
        .markdown-body table{border-collapse:collapse;width:100%;margin-bottom:16px}
        .markdown-body th,.markdown-body td{padding:6px 13px;border:1px solid var(--border)}
        .markdown-body th{background:var(--surface);font-weight:600}
        .markdown-body tr:nth-child(2n){background:var(--surface)}
        .markdown-body hr{height:0.25em;background:var(--border);border:0;margin:24px 0}
        .markdown-body img{max-width:100%;border-radius:6px}
        .loading{text-align:center;padding:60px;color:var(--muted)}
        .toc{background:var(--surface);padding:20px;border-radius:8px;margin-bottom:30px;border:1px solid var(--border)}
        .toc h3{margin-bottom:10px;color:var(--accent)}
        .toc ul{list-style:none;padding:0}
        .toc li{margin:8px 0}
        .toc a{color:var(--muted);text-decoration:none;font-size:14px}
        .toc a:hover{color:var(--accent)}
        @media(max-width:768px){.container{padding:16px}.markdown-body h1{font-size:1.5em}}
    </style>
</head>
<body>
    <nav class="nav">
        <a href="../">← Все курсы</a>
        <a href="https://github.com/galaersh-ai">GitHub</a>
    </nav>
    <div class="container">
        <div id="toc" class="toc" style="display:none"></div>
        <div class="markdown-body" id="content"><div class="loading">Загрузка...</div></div>
    </div>
    <script>
        const file = 'README_RU.md';
        fetch(file)
            .then(r => r.text())
            .then(text => {
                document.getElementById('content').innerHTML = marked.parse(text);
                const h1 = document.querySelector('h1');
                if (h1) document.title = h1.textContent + ' — RAG from Scratch';
                // Build TOC
                const headings = document.querySelectorAll('h2');
                if (headings.length > 2) {
                    let toc = '<h3>📖 Оглавление</h3><ul>';
                    headings.forEach((h, i) => {
                        const id = 'section-' + i;
                        h.id = id;
                        toc += '<li><a href="#' + id + '">' + h.textContent + '</a></li>';
                    });
                    toc += '</ul>';
                    document.getElementById('toc').innerHTML = toc;
                    document.getElementById('toc').style.display = 'block';
                }
            })
            .catch(err => {
                document.getElementById('content').innerHTML = '<p style="color:#f78166">Ошибка загрузки</p><p><a href="../">← Назад</a></p>';
            });
    </script>
</body>
</html>
